<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>தமிழ் மாதங்கள்</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<style>

/* ===================================
   RESET
=================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100vh;
}

body{

    font-family:'Noto Sans Tamil',sans-serif;

    background:#F8F0DD;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:18px;

    overflow-x:hidden;

}



/* ===================================
   PAGE
=================================== */

.page{

    position:relative;

    width:min(900px,100%);

    background:#F9F3E4;

    border-radius:32px;

    padding:34px 38px 26px;

    overflow:hidden;

    box-shadow:
        0 10px 25px rgba(0,0,0,.08);

}



/* ===================================
   DECORATIONS
=================================== */

/* Top Left Spiral */

.swirl{

    position:absolute;

    left:22px;
    top:18px;

    width:85px;
    height:85px;

    border:7px solid #F0C64A;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

    transform:rotate(-25deg);

    opacity:.9;

}

.swirl::after{

    content:"";

    position:absolute;

    left:15px;
    top:15px;

    width:42px;
    height:42px;

    border:6px solid #F0C64A;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

}



/* Top Right Curve */

.curve-top{

    position:absolute;

    right:30px;
    top:22px;

    width:95px;
    height:28px;

    border-top:6px solid #F09B9B;

    border-radius:60px;

    transform:rotate(8deg);

}



/* Right Sparkle */

.sparkle{

    position:absolute;

    right:36px;

    top:200px;

    width:42px;
    height:42px;

}

.sparkle::before,
.sparkle::after{

    content:"";

    position:absolute;

    background:#FF8A7A;

    border-radius:20px;

}

.sparkle::before{

    width:6px;
    height:100%;

    left:50%;

    transform:translateX(-50%);

}

.sparkle::after{

    height:6px;
    width:100%;

    top:50%;

    transform:translateY(-50%);

}



/* ===================================
   TITLE
=================================== */

.title{

    text-align:center;

    color:#73160E;

    font-size:52px;

    font-weight:800;

    line-height:1.1;

    margin-bottom:26px;

    letter-spacing:.5px;

    text-shadow:

        0 1px 0 #ffffff,

        0 2px 5px rgba(0,0,0,.08);

}





/* ===================================
   MONTHS
=================================== */

.months-wrapper{

    display:flex;
    justify-content:space-between;
    gap:20px;

    margin-bottom:28px;

}

.card{

    flex:1;

    border-radius:28px;

    padding:18px 16px;

    display:flex;
    flex-direction:column;
    gap:10px;

}

.pink{

    background:#F4CFD8;

}

.yellow{

    background:#F8E4A5;

}



/* ===================================
   MONTH BUTTONS
=================================== */

.month-btn{

    background:transparent;

    border:none;

    width:100%;

    font-family:inherit;

    font-size:29px;

    color:#111;

    cursor:pointer;

    padding:6px;

    border-radius:12px;

    transition:.25s;

}

.month-btn:hover{

    background:#ffffff;

    transform:translateY(-2px);

}

.month-btn.active{

    background:#FFF59A;

}



/* ===================================
   AATHICHUDI HEADER
=================================== */

.aathichudi-header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:18px;

    margin-bottom:18px;

}

.heading{

    background:#F8B8C7;

    color:#CF1F1A;

    font-size:34px;

    font-weight:800;

    padding:6px 28px;

    border-radius:35px;

    border:2px solid #F193A8;

    text-shadow:1px 1px #fff;

}

.line{

    width:55px;
    height:5px;

    background:#000;

    border-radius:10px;

    position:relative;

}

.line::before,
.line::after{

    content:"";

    position:absolute;

    width:42px;
    height:5px;

    background:#000;

    border-radius:10px;

}

.left::before{

    left:0;
    top:-12px;

    transform:rotate(24deg);

}

.left::after{

    left:0;
    top:12px;

    transform:rotate(-24deg);

}

.right::before{

    right:0;
    top:-12px;

    transform:rotate(-24deg);

}

.right::after{

    right:0;
    top:12px;

    transform:rotate(24deg);

}



/* ===================================
   AATHICHUDI CARD
=================================== */

.aathichudi-card{

    background:#F7E3A8;

    border-radius:30px;

    padding:22px;

    display:flex;

    gap:24px;

}

.column{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:8px;

}



/* ===================================
   RULE BUTTONS
=================================== */

.rule-btn{

    background:none;

    border:none;

    text-align:left;

    font-family:inherit;

    font-size:22px;

    line-height:1.35;

    padding:6px 8px;

    border-radius:10px;

    cursor:pointer;

    transition:.25s;

}

.rule-btn:hover{

    background:#fff;

    transform:translateX(5px);

}

.rule-btn.active{

    background:#FFF59A;

}



/* ===================================
   PAGE NUMBER
=================================== */

.page-number{

    margin-top:18px;

    text-align:center;

    font-size:34px;

    font-weight:800;

    color:#7E58FF;

}



/* ===================================
   TABLET
=================================== */

@media (max-width:900px){

.page{

    padding:24px;

}

.title{

    font-size:42px;

}

.month-btn{

    font-size:24px;

}

.heading{

    font-size:28px;

}

.rule-btn{

    font-size:18px;

}

}



/* ===================================
   MOBILE
=================================== */

@media (max-width:600px){

body{

    padding:8px;

}

.page{

    width:100%;

    max-width:390px;

    padding:16px;

    border-radius:20px;

}

/* Keep side by side */

.months-wrapper{

    gap:8px;

    margin-bottom:18px;

}

.card{

    padding:10px;

    gap:6px;

    border-radius:18px;

}

.month-btn{

    font-size:17px;

    padding:2px;

}

.title{

    font-size:28px;

    margin-bottom:16px;

}

.heading{

    font-size:20px;

    padding:4px 16px;

}

.line{

    width:26px;
    height:4px;

}

.line::before,
.line::after{

    width:20px;
    height:4px;

    top:auto;

}

.left::before{

    top:-7px;

}

.left::after{

    top:7px;

}

.right::before{

    top:-7px;

}

.right::after{

    top:7px;

}

.aathichudi-card{

    padding:12px;

    gap:10px;

    border-radius:20px;

}

.rule-btn{

    font-size:13px;

    line-height:1.25;

    padding:2px;

}

.page-number{

    font-size:22px;

    margin-top:12px;

}

/* Decorations */

.swirl{

    transform:scale(.45);

    left:-8px;
    top:-8px;

}

.curve-top{

    transform:scale(.55);

    right:-4px;
    top:6px;

}

.sparkle{

    transform:scale(.45);

    right:12px;
    top:130px;

}

}

</style>

<body>

<div class="page">

         DECORATIONS
    =========================== -->

    <!-- ==========================
            TITLE
    =========================== -->

    <h1 class="title">

    <!-- ==========================

        </div>



        <!-- RIGHT CARD -->

        <div class="card yellow">

            <button class="month-btn" data-audio="aippasi">

            </button>

            <button class="month-btn" data-audio="karthigai">

    <!-- ==========================

=========================== -->

<audio id="purattasi" src="audio/purattasi.mp3"></audio>

<audio id="aippasi" src="audio/aippasi.mp3"></audio>
<audio id="karthigai" src="audio/karthigai.mp3"></audio>
<audio id="margazhi" src="audio/margazhi.mp3"></audio>
<audio id="thai" src="audio/thai.mp3"></audio>
<audio id="maasi" src="audio/maasi.mp3"></audio>
<audio id="panguni" src="audio/panguni.mp3"></audio>


<audio id="aram" src="audio/aram.mp3"></audio>
<audio id="aaruvathu" src="audio/aaruvathu.mp3"></audio>
<audio id="iyalvathu" src="audio/iyalvathu.mp3"></audio>
<audio id="eevathu" src="audio/eevathu.mp3"></audio>

<audio id="ookkamathu" src="audio/ookkamathu.mp3"></audio>

<audio id="erpathu" src="audio/erpathu.mp3"></audio>
<audio id="aiyam" src="audio/aiyam.mp3"></audio>
<audio id="oppura" src="audio/oppura.mp3"></audio>
<audio id="othuvathu" src="audio/othuvathu.mp3"></audio>
<audio id="auviyam" src="audio/auviyam.mp3"></audio>



<script>


/* ===================================
   PAGE 33
   TAMIL MONTHS + AATHICHUDI
=================================== */

let currentAudio = null;
let currentButton = null;

/* ==========================
   PLAY / STOP AUDIO
========================== */

function stopCurrent(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime = 0;

        currentAudio = null;
    }

    if(currentButton){

        currentButton.classList.remove("active");

        currentButton = null;
    }

}


document.querySelectorAll("[data-audio]").forEach(button=>{

    button.addEventListener("click",()=>{

        const audio=document.getElementById(button.dataset.audio);

        if(!audio) return;

        /* CLICK SAME BUTTON AGAIN */

        if(currentAudio===audio){

            stopCurrent();

            return;
        }

        /* STOP PREVIOUS */

        stopCurrent();

        /* PLAY NEW */

        currentAudio=audio;
        currentButton=button;

        button.classList.add("active");

        audio.currentTime=0;

        audio.play();

        /* WHEN AUDIO ENDS */

        audio.onended=()=>{

            button.classList.remove("active");

            currentAudio=null;
            currentButton=null;

        };

    });

});



/* ==========================
   SPACEBAR
   Pause / Resume
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.code!=="Space") return;

    e.preventDefault();

    if(!currentAudio) return;

    if(currentAudio.paused){

        currentAudio.play();

    }else{

        currentAudio.pause();

    }

});



/* ==========================
   ESC
   Stop Audio
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        stopCurrent();

    }

});



/* ==========================
   Stop Audio When
   Leaving Page
========================== */

window.addEventListener("beforeunload",()=>{

    stopCurrent();

});



/* ==========================
   Prevent Double Tap Zoom
   On Mobile
========================== */

let lastTouchEnd=0;

document.addEventListener("touchend",(event)=>{

    const now=(new Date()).getTime();

    if(now-lastTouchEnd<=300){

        event.preventDefault();

    }

    lastTouchEnd=now;

},{passive:false});



/* ==========================
   Keyboard Navigation
========================== */

const buttons=[...document.querySelectorAll("[data-audio]")];

buttons.forEach((btn,index)=>{

    btn.setAttribute("tabindex","0");

    btn.addEventListener("keydown",(e)=>{

        if(e.key==="ArrowDown"){

            e.preventDefault();

            if(buttons[index+1]){

                buttons[index+1].focus();

            }

        }

        if(e.key==="ArrowUp"){

            e.preventDefault();

            if(buttons[index-1]){

                buttons[index-1].focus();

            }

        }

        if(e.key==="Enter"){

            btn.click();

        }

    });

});



/* ==========================
   Small Click Animation
========================== */

document.querySelectorAll(".month-btn,.rule-btn").forEach(btn=>{

    btn.addEventListener("mousedown",()=>{

        btn.style.transform="scale(.95)";

    });

    btn.addEventListener("mouseup",()=>{

        btn.style.transform="";

    });

    btn.addEventListener("mouseleave",()=>{

        btn.style.transform="";

    });

});



/* ==========================
   Console Message
========================== */

console.log("Page 33 Loaded Successfully");    

</script>
