<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>தமிழ் மாதங்கள்</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<style>

/* =====================================================
   RESET
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:'Noto Sans Tamil',sans-serif;

    background:#F8F0DD;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    min-height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    padding:20px;

}


.app{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

}


/* =====================================================
   MAIN PAGE
===================================================== */

.page{

    position:relative;

    width:min(900px,100%);

    background:#F9F3E4;

    border-radius:30px;

    padding:28px 32px 18px;

    overflow:visible;

    box-shadow:
        0 10px 28px rgba(0,0,0,.18);

}



/* =====================================================
   RED BOOK SPINE
===================================================== */

.page::before{

    content:"";

    position:absolute;

    left:-10px;

    top:20px;

    bottom:20px;

    width:18px;

    background:#D40C02;

    border-radius:10px;

}



/* =====================================================
   DECORATIONS
===================================================== */

.swirl{

    position:absolute;

    left:18px;
    top:14px;

    width:80px;
    height:80px;

    border:6px solid #F2C94C;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

    transform:rotate(-20deg);

}

.swirl::after{

    content:"";

    position:absolute;

    left:14px;
    top:14px;

    width:38px;
    height:38px;

    border:5px solid #F2C94C;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

}



.curve-top{

    position:absolute;

    right:28px;
    top:18px;

    width:92px;
    height:26px;

    border-top:6px solid #F19DA5;

    border-radius:60px;

    transform:rotate(8deg);

}



.sparkle{

    position:absolute;

    right:32px;

    top:180px;

    width:36px;
    height:36px;

}

.sparkle::before,
.sparkle::after{

    content:"";

    position:absolute;

    background:#FF847C;

    border-radius:10px;

}

.sparkle::before{

    width:5px;

    height:100%;

    left:50%;

    transform:translateX(-50%);

}

.sparkle::after{

    width:100%;

    height:5px;

    top:50%;

    transform:translateY(-50%);

}



/* =====================================================
   PAGE TITLE
===================================================== */

.title{

    text-align:center;

    color:#73160E;

    font-size:48px;

    font-weight:800;

    letter-spacing:.5px;

    margin-bottom:20px;

    text-shadow:

        0 1px 0 #fff,

        0 2px 4px rgba(0,0,0,.08);

}



/* =====================================================
   MONTH SECTION
===================================================== */

.months-wrapper{

    display:flex;

    justify-content:space-between;

    gap:18px;

    margin-bottom:22px;

}



.card{

    flex:1;

    border-radius:26px;

    padding:16px;

    display:flex;

    flex-direction:column;

    gap:8px;

}



.pink{

    background:#F5CFD8;

}



.yellow{

    background:#F8E3A8;

}



/* =====================================================
   MONTH BUTTONS
===================================================== */

.month-btn{

    background:transparent;

    border:none;

    width:100%;

    font-family:inherit;

    font-size:27px;

    color:#111;

    padding:5px;

    border-radius:10px;

    cursor:pointer;

    transition:.25s;

}



.month-btn:hover{

    background:#fff;

    transform:translateY(-2px);

    box-shadow:0 4px 10px rgba(0,0,0,.12);

}



.month-btn.active{

    background:#FFF59A;

    color:#C62828;

}



/* Small Click Effect */

.month-btn:active{

    transform:scale(.96);

}


/* =====================================================
   AATHICHUDI HEADER
===================================================== */

.aathichudi-header{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:14px;

    margin-bottom:14px;

}

.heading{

    background:#F7B9C8;

    color:#D12020;

    font-size:30px;

    font-weight:800;

    padding:6px 24px;

    border-radius:30px;

    border:2px solid #EF8FA6;

    text-shadow:1px 1px #fff;

}



.line{

    position:relative;

    width:48px;

    height:5px;

    background:#000;

    border-radius:10px;

}

.line::before,
.line::after{

    content:"";

    position:absolute;

    width:36px;

    height:5px;

    background:#000;

    border-radius:10px;

}

.left::before{

    top:-10px;

    left:0;

    transform:rotate(25deg);

}

.left::after{

    top:10px;

    left:0;

    transform:rotate(-25deg);

}

.right::before{

    top:-10px;

    right:0;

    transform:rotate(-25deg);

}

.right::after{

    top:10px;

    right:0;

    transform:rotate(25deg);

}



/* =====================================================
   AATHICHUDI CARD
===================================================== */

.aathichudi-card{

    background:#F8E4A8;

    border-radius:28px;

    padding:18px;

    display:flex;

    gap:18px;

}

.column{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:6px;

}



/* =====================================================
   RULE BUTTONS
===================================================== */

.rule-btn{

    background:none;

    border:none;

    text-align:left;

    font-family:inherit;

    font-size:21px;

    line-height:1.28;

    padding:5px 6px;

    border-radius:8px;

    cursor:pointer;

    transition:.25s;

}

.rule-btn:hover{

    background:#fff;

    transform:translateX(5px);

    box-shadow:0 4px 10px rgba(0,0,0,.12);

}

.rule-btn.active{

    background:#FFF59A;

    color:#C62828;

}

.rule-btn:active{

    transform:scale(.97);

}



/* =====================================================
   PAGE NUMBER
===================================================== */

.page-number{

    margin-top:12px;

    text-align:center;

    font-size:22px;

    font-weight:800;

    color:#8D64D8;

}



/* =====================================================
   NAVIGATION
===================================================== */

.navigation{

    margin-top:16px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:60px;

    height:60px;

    border:none;

    border-radius:50%;

    background:#F9F3E4;

    font-size:28px;

    cursor:pointer;

    box-shadow:0 5px 15px rgba(0,0,0,.18);

    transition:.25s;

}

.nav-btn:hover{

    transform:scale(1.08);

}



.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#A8B0B0;

}

.dot.active{

    background:#19D400;

}



/* =====================================================
   TABLET
===================================================== */

@media (max-width:900px){

.page{

    padding:22px;

}

.title{

    font-size:40px;

}

.month-btn{

    font-size:23px;

}

.heading{

    font-size:26px;

}

.rule-btn{

    font-size:18px;

}

}



/* =====================================================
   MOBILE
===================================================== */

@media (max-width:600px){

html,
body{

    overflow-y:auto;

    overflow-x:hidden;

}

body{

    padding:0;

}



/* PAGE */

.page{

    width:100%;

    max-width:390px;

    padding:10px;

    border-radius:18px;

}



/* RED SPINE */

.page::before{

    width:8px;

    left:-4px;

    top:10px;

    bottom:10px;

}



/* TITLE */

.title{

    font-size:25px;

    margin-bottom:8px;

}



/* MONTHS */

.months-wrapper{

    gap:6px;

    margin-bottom:10px;

}

.card{

    padding:8px;

    gap:4px;

    border-radius:16px;

}

.month-btn{

    font-size:16px;

    padding:2px;

}



/* HEADER */

.aathichudi-header{

    gap:8px;

    margin-bottom:8px;

}

.heading{

    font-size:18px;

    padding:4px 12px;

}

.line{

    width:22px;

    height:4px;

}

.line::before,
.line::after{

    width:16px;

    height:4px;

}

.left::before{

    top:-6px;

}

.left::after{

    top:6px;

}

.right::before{

    top:-6px;

}

.right::after{

    top:6px;

}



/* CARD */

.aathichudi-card{

    padding:8px;

    gap:8px;

    border-radius:16px;

}



/* RULES */

.rule-btn{

    font-size:12px;

    line-height:1.15;

    padding:1px;

}



/* PAGE NUMBER */

.page-number{

    font-size:16px;

    margin-top:4px;

}



/* NAVIGATION */

.navigation{

    margin-top:8px;

}

.nav-btn{

    width:36px;

    height:36px;

    font-size:18px;

}

.dot{

    width:8px;

    height:8px;

}



/* DECORATIONS */

.swirl{

    transform:scale(.42);

    left:-8px;

    top:-8px;

}

.curve-top{

    transform:scale(.55);

    right:-6px;

    top:2px;

}

.sparkle{

    transform:scale(.42);

    right:10px;

    top:105px;

}

}

</style>

<body>

<script>


/* ===================================
   PAGE 33
   TAMIL MONTHS + AATHICHUDI
=================================== */

let currentAudio = null;
let currentButton = null;

/* ==========================
   PLAY / STOP AUDIO
========================== */

function stopCurrent(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime = 0;

        currentAudio = null;
    }

    if(currentButton){

        currentButton.classList.remove("active");

        currentButton = null;
    }

}


document.querySelectorAll("[data-audio]").forEach(button=>{

    button.addEventListener("click",()=>{

        const audio=document.getElementById(button.dataset.audio);

        if(!audio) return;

        /* CLICK SAME BUTTON AGAIN */

        if(currentAudio===audio){

            stopCurrent();

            return;
        }

        /* STOP PREVIOUS */

        stopCurrent();

        /* PLAY NEW */

        currentAudio=audio;
        currentButton=button;

        button.classList.add("active");

        audio.currentTime=0;

        audio.play();

        /* WHEN AUDIO ENDS */

        audio.onended=()=>{

            button.classList.remove("active");

            currentAudio=null;
            currentButton=null;

        };

    });

});



/* ==========================
   SPACEBAR
   Pause / Resume
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.code!=="Space") return;

    e.preventDefault();

    if(!currentAudio) return;

    if(currentAudio.paused){

        currentAudio.play();

    }else{

        currentAudio.pause();

    }

});



/* ==========================
   ESC
   Stop Audio
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        stopCurrent();

    }

});



/* ==========================
   Stop Audio When
   Leaving Page
========================== */

window.addEventListener("beforeunload",()=>{

    stopCurrent();

});



/* ==========================
   Prevent Double Tap Zoom
   On Mobile
========================== */

let lastTouchEnd=0;

document.addEventListener("touchend",(event)=>{

    const now=(new Date()).getTime();

    if(now-lastTouchEnd<=300){

        event.preventDefault();

    }

    lastTouchEnd=now;

},{passive:false});



/* ==========================
   Keyboard Navigation
========================== */

const buttons=[...document.querySelectorAll("[data-audio]")];

buttons.forEach((btn,index)=>{

    btn.setAttribute("tabindex","0");

    btn.addEventListener("keydown",(e)=>{

        if(e.key==="ArrowDown"){

            e.preventDefault();

            if(buttons[index+1]){

                buttons[index+1].focus();

            }

        }

        if(e.key==="ArrowUp"){

            e.preventDefault();

            if(buttons[index-1]){

                buttons[index-1].focus();

            }

        }

        if(e.key==="Enter"){

            btn.click();

        }

    });

});



/* ==========================
   Small Click Animation
========================== */

document.querySelectorAll(".month-btn,.rule-btn").forEach(btn=>{

    btn.addEventListener("mousedown",()=>{

        btn.style.transform="scale(.95)";

    });

    btn.addEventListener("mouseup",()=>{

        btn.style.transform="";

    });

    btn.addEventListener("mouseleave",()=>{

        btn.style.transform="";

    });

});


/* =========================
   PAGE FLIP
========================= */

function nextPage(page,direction){

    const app=document.querySelector(".app");

    app.classList.remove("flip-out-next","flip-out-prev");

    void app.offsetWidth;

    if(direction==="next"){

        app.classList.add("flip-out-next");

    }
    else{

        app.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
