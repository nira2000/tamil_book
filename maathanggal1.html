<style>

/* =====================================================
   RESET
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:'Noto Sans Tamil',sans-serif;

    background:#111D66;;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    min-height:100vh;

    overflow-y:auto;

    overflow-x:hidden;

    padding:20px;

}


.app{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    max-width:800px;

    transform-style:preserve-3d;

}


/* =====================================================
   MAIN PAGE
===================================================== */

.book{

    position:relative;

    width:min(900px,100%);

    background:#F9F3E4;

    border-radius:30px;

    padding:40px;

    overflow:visible;

    box-shadow:
        0 10px 30px rgba(0,0,0,.25);

}



/* =====================================================
   RED BOOK SPINE
===================================================== */

.book::before{

    content:"";

    position:absolute;

    left:-10px;

    top:20px;

    bottom:20px;

    width:18px;

    background:#D40C02;

    border-radius:10px;

}



/* =====================================================
   DECORATIONS
===================================================== */

.swirl{

    position:absolute;

    left:18px;
    top:14px;

    width:80px;
    height:80px;

    border:6px solid #F2C94C;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

    transform:rotate(-20deg);

}

.swirl::after{

    content:"";

    position:absolute;

    left:14px;
    top:14px;

    width:38px;
    height:38px;

    border:5px solid #F2C94C;

    border-right-color:transparent;
    border-bottom-color:transparent;

    border-radius:50%;

}



.curve-top{

    position:absolute;

    right:28px;
    top:18px;

    width:92px;
    height:26px;

    border-top:6px solid #F19DA5;

    border-radius:60px;

    transform:rotate(8deg);

}



.sparkle{

    position:absolute;

    right:32px;

    top:180px;

    width:36px;
    height:36px;

}

.sparkle::before,
.sparkle::after{

    content:"";

    position:absolute;

    background:#FF847C;

    border-radius:10px;

}

.sparkle::before{

    width:5px;

    height:100%;

    left:50%;

    transform:translateX(-50%);

}

.sparkle::after{

    width:100%;

    height:5px;

    top:50%;

    transform:translateY(-50%);

}



/* =====================================================
   PAGE TITLE
===================================================== */

.title{

    text-align:center;

    color:#73160E;

    font-size:48px;

    font-weight:800;

    letter-spacing:.5px;

    margin-bottom:20px;

    text-shadow:

        0 1px 0 #fff,

        0 2px 4px rgba(0,0,0,.08);

}



/* =====================================================
   MONTH SECTION
===================================================== */

.months-wrapper{

    display:flex;

    justify-content:space-between;

    gap:18px;

    margin-bottom:22px;

}



.card{

    flex:1;

    border-radius:26px;

    padding:16px;

    display:flex;

    flex-direction:column;

    gap:8px;

}



.pink{

    background:#F5CFD8;

}



.yellow{

    background:#F8E3A8;

}



/* =====================================================
   MONTH BUTTONS
===================================================== */

.month-btn{

    background:transparent;

    border:none;

    width:100%;

    font-family:inherit;

    font-size:27px;

    color:#111;

    padding:5px;

    border-radius:10px;

    cursor:pointer;

    transition:.25s;

}



.month-btn:hover{

    background:#fff;

    transform:translateY(-2px);

    box-shadow:0 4px 10px rgba(0,0,0,.12);

}



.month-btn.active{

    background:#FFF59A;

    color:#C62828;

}



/* Small Click Effect */

.month-btn:active{

    transform:scale(.96);

}


/* =====================================================
   AATHICHUDI HEADER
===================================================== */

.aathichudi-header{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:14px;

    margin-bottom:14px;

}

.heading{

    background:#F7B9C8;

    color:#D12020;

    font-size:30px;

    font-weight:800;

    padding:6px 24px;

    border-radius:30px;

    border:2px solid #EF8FA6;

    text-shadow:1px 1px #fff;

    cursor:pointer;

    position:relative;

    font-family:inherit;

    transition:.25s;

}



.line{

    position:relative;

    width:48px;

    height:5px;

    background:#000;

    border-radius:10px;

}

.line::before,
.line::after{

    content:"";

    position:absolute;

    width:36px;

    height:5px;

    background:#000;

    border-radius:10px;

}

.left::before{

    top:-10px;

    left:0;

    transform:rotate(25deg);

}

.left::after{

    top:10px;

    left:0;

    transform:rotate(-25deg);

}

.right::before{

    top:-10px;

    right:0;

    transform:rotate(-25deg);

}

.right::after{

    top:10px;

    right:0;

    transform:rotate(25deg);

}



/* =====================================================
   AATHICHUDI CARD
===================================================== */

.aathichudi-card{

    background:#F8E4A8;

    border-radius:28px;

    padding:18px;

    display:flex;

    gap:18px;

}

.column{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:6px;

}



/* =====================================================
   RULE BUTTONS
===================================================== */

.rule-btn{

    background:none;

    border:none;

    text-align:left;

    font-family:inherit;

    font-size:21px;

    line-height:1.28;

    padding:5px 6px;

    border-radius:8px;

    cursor:pointer;

    transition:.25s;

}

.rule-btn:hover{

    background:#fff;

    transform:translateX(5px);

    box-shadow:0 4px 10px rgba(0,0,0,.12);

}

.rule-btn.active{

    background:#FFF59A;

    color:#C62828;

}

.rule-btn:active{

    transform:scale(.97);

}


.speaker-btn{

    position:relative;

    border:2px solid rgba(0,0,0,.18);

    box-shadow:0 3px 8px rgba(0,0,0,.12);

}

.speaker-btn:hover{

    border-color:#D12020;

}

.speaker-icon{

    position:absolute;

    top:4px;

    right:6px;

    font-size:11px;

    opacity:.8;

    pointer-events:none;

}

.month-btn,
.rule-btn{

    transition:.25s;

}

.month-btn.active,
.rule-btn.active{

    background:#FFF59A;

    border-color:#E53935;

    color:#C62828;

    box-shadow:
        0 0 10px rgba(255,215,0,.8),
        0 0 18px rgba(255,215,0,.4);

}


.word{
    display:inline-block;
    padding:2px 4px;
    border-radius:6px;
    transition:.25s;
}

.word.active{
    background:#FFF59A;
    color:#D50000;
    font-weight:700;
    box-shadow:0 0 8px rgba(255,215,0,.8);
}



/* =====================================================
   PAGE NUMBER
===================================================== */

.page-number{

    margin-top:12px;

    text-align:center;

    font-size:22px;

    font-weight:800;

    color:#8D64D8;

}



/* =====================================================
   NAVIGATION
===================================================== */

.navigation{

    margin-top:16px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:60px;

    height:60px;

    border:none;

    border-radius:50%;

    background:#F9F3E4;

    font-size:28px;

    cursor:pointer;

    box-shadow:0 5px 15px rgba(0,0,0,.18);

    transition:.25s;

}

.nav-btn:hover{

    transform:scale(1.08);

}



.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#A8B0B0;

}

.dot.active{

    background:#19D400;

}






/* =====================================================
   MOBILE
===================================================== */

/* SPEAKER ICON */

/* BUTTON TEXT */

.text{

}

/* WORD HIGHLIGHT */

.word{
    padding:1px 2px;
    border-radius:4px;
}

}





</style>

<script>

/* ===================================
   PAGE 33
   TAMIL MONTHS + AATHICHUDI
=================================== */

let currentAudio = null;
let currentButton = null;

/* ==========================
   WORD TIMINGS
========================== */

const wordTimings = {

    aram:[0,0.9,1.8],

    aaruvathu:[0,1.0],

    iyalvathu:[0,1.0],

    eevathu:[0,0.9],

    udaiyathu:[0,1.0],

    ookkamathu:[0,1.2],

    en_ezhuthu:[0,0.7,1.4],

    erpathu:[0,1.0],

    aiyam:[0,0.7,1.4],

    oppura:[0,1.0],

    othuvathu:[0,1.0],

    auviyam:[0,1.0]

};

/* ==========================
   WORD HIGHLIGHT
========================== */

function clearWordHighlight(button){

    if(!button) return;

    button.querySelectorAll(".word").forEach(word=>{

        word.classList.remove("active");

    });

}

function animateWords(button,audioId){

    clearWordHighlight(button);

    const words = button.querySelectorAll(".word");

    const timings = wordTimings[audioId];

    if(!timings) return;

    timings.forEach((time,index)=>{

        setTimeout(()=>{

            if(currentButton!==button) return;

            words.forEach(word=>{

                word.classList.remove("active");

            });

            if(words[index]){

                words[index].classList.add("active");

            }

        },time*1000);

    });

}

/* ==========================
   STOP AUDIO
========================== */

function stopCurrent(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime=0;

        currentAudio=null;

    }

    if(currentButton){

        currentButton.classList.remove("active");

        clearWordHighlight(currentButton);

        currentButton=null;

    }

}

/* ==========================
   PLAY AUDIO
========================== */

document.querySelectorAll("[data-audio]").forEach(button=>{

    button.addEventListener("click",()=>{

        const audio=document.getElementById(button.dataset.audio);

        if(!audio) return;

        if(currentAudio===audio){

            stopCurrent();

            return;

        }

        stopCurrent();

        currentAudio=audio;
        currentButton=button;

        button.classList.add("active");

        audio.currentTime=0;

        audio.play();

        animateWords(button,button.dataset.audio);

        audio.onended=()=>{

            button.classList.remove("active");

            clearWordHighlight(button);

            currentAudio=null;
            currentButton=null;

        };

    });

});

/* ==========================
   SPACEBAR
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.code!=="Space") return;

    e.preventDefault();

    if(!currentAudio) return;

    if(currentAudio.paused){

        currentAudio.play();

    }else{

        currentAudio.pause();

    }

});

/* ==========================
   ESC
========================== */

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        stopCurrent();

    }

});

/* ==========================
   BEFORE UNLOAD
========================== */

window.addEventListener("beforeunload",()=>{

    stopCurrent();

});

/* ==========================
   DOUBLE TAP ZOOM
========================== */

let lastTouchEnd=0;

document.addEventListener("touchend",(event)=>{

    const now=(new Date()).getTime();

    if(now-lastTouchEnd<=300){

        event.preventDefault();

    }

    lastTouchEnd=now;

},{passive:false});

/* ==========================
   KEYBOARD NAVIGATION
========================== */

const buttons=[...document.querySelectorAll("[data-audio]")];

buttons.forEach((btn,index)=>{

    btn.setAttribute("tabindex","0");

    btn.addEventListener("keydown",(e)=>{

        if(e.key==="ArrowDown"){

            e.preventDefault();

            if(buttons[index+1]){

                buttons[index+1].focus();

            }

        }

        if(e.key==="ArrowUp"){

            e.preventDefault();

            if(buttons[index-1]){

                buttons[index-1].focus();

            }

        }

        if(e.key==="Enter"){

            btn.click();

        }

    });

});

/* ==========================
   CLICK ANIMATION
========================== */

document.querySelectorAll(".month-btn,.rule-btn").forEach(btn=>{

    btn.addEventListener("mousedown",()=>{

        btn.style.transform="scale(.95)";

    });

    btn.addEventListener("mouseup",()=>{

        btn.style.transform="";

    });

    btn.addEventListener("mouseleave",()=>{

        btn.style.transform="";

    });

});

/* ==========================
   PAGE FLIP
========================== */

function nextPage(page,direction){

    const app=document.querySelector(".app");

    app.classList.remove("flip-out-next","flip-out-prev");

    void app.offsetWidth;

    if(direction==="next"){

        app.classList.add("flip-out-next");

    }else{

        app.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
