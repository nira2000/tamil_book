<style>
    


/* ===========================================
   PAGE 45 - TAMIL DIGITAL BOOK
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Tamil',sans-serif;
    background:#1b2c73;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* ========================================= */

/* ===========================================
   PAGE CONTAINER
=========================================== */

.page-container{

    position:relative;

    width:100%;
    max-width:900px;

    background:#fffef8;

    border:8px solid #f2d8a0;

    border-radius:30px;

    padding:30px 35px;

    box-shadow:0 10px 25px rgba(0,0,0,.15);

}

/* RED SPINE */

.page-container::before{

    content:"";

    position:absolute;

    left:10px;

    top:22px;

    bottom:22px;

    width:10px;

    background:#D40C02;

    border-radius:8px;

}

/* ===========================================
   LESSON
=========================================== */

.lesson-number{

    font-size:26px;

    font-weight:700;

    margin-bottom:10px;

}

/* ===========================================
   TITLE
=========================================== */

.title-box{

    width:fit-content;

    margin:0 auto 30px;

    padding:10px 24px;

    background:#fff3c9;

    border:3px solid #d6a54f;

    border-radius:14px;

}

.title-box h1{

    font-size:42px;

    font-weight:700;

}

/* ===========================================
   WORD GRID
=========================================== */

.word-grid{
    display:grid;
    grid-template-columns:repeat(3,220px);
    justify-content:center;
    column-gap:45px;
    row-gap:8px;
}

/* ===========================================
   BUTTONS
=========================================== */

.word-btn{

    width:220px;

    height:62px;

    border:none;

    border-radius:10px;

    font-family:'Noto Sans Tamil',sans-serif;

    font-size:24px;

    font-weight:600;

    cursor:pointer;

    border:2px solid rgba(0,0,0,.18);

    box-shadow:0 4px 8px rgba(0,0,0,.12);

    transition:.25s;

}

.word-btn:hover{

    transform:translateY(-2px);

}

/* ===========================================
   COLOURS
=========================================== */

.green{

    background:#7fd567;

}

.green-light{

    background:#b8f762;

}

.yellow{

    background:#ffef9c;

}

.blue{

    background:#64d2e5;

}

.orange{

    background:#ff9c74;

}


/* ===========================
   COLOUR GROUP SPACING
=========================== */


/* Gap before YELLOW section */
.word-grid button:nth-child(19),
.word-grid button:nth-child(20),
.word-grid button:nth-child(21){

    margin-top:40px;

}

/* Gap before BLUE section */
.word-grid button:nth-child(28),
.word-grid button:nth-child(29),
.word-grid button:nth-child(30){

    margin-top:40px;

}

/* Gap before ORANGE section */
.word-grid button:nth-child(37),
.word-grid button:nth-child(38),
.word-grid button:nth-child(39){

    margin-top:40px;

}



/* ===========================================
   PAGE NUMBER
=========================================== */

.page-number{

    margin-top:24px;

    text-align:center;

    color:#7a42d5;

    font-size:24px;

    font-weight:bold;

}

/* ===========================================
   NAVIGATION
=========================================== */

.navigation{

    margin-top:16px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:56px;

    height:56px;

    border:none;

    border-radius:50%;

    background:#fff8ea;

    font-size:26px;

    cursor:pointer;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

    transition:.25s;

}

.nav-btn:hover{

    transform:scale(1.05);

}

.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:10px;

    height:10px;

    border-radius:50%;

    background:#bbb;

}

.dot.active{

    background:#35ff2d;

}


/* ===========================================
   LETTER HIGHLIGHT
=========================================== */

.word-btn span{

    display:inline-block;

    color:#111;

    transition:all .25s ease;

}

.word-btn span.active{

    color:#ff0000;

    font-weight:700;

    transform:scale(1.12);

    text-shadow:0 0 5px rgba(255,0,0,.35);

}

<script>
    

const buttons = document.querySelectorAll(".word-btn");

let currentAudio = null;
let currentButton = null;
let timers = [];




const timings = {

    // ==========================
    // GREEN
    // ==========================

    "audiogreen1.mp3":[0,5000],       // த | டி
    "audiogreen2.mp3":[0,5000],       // பட் | டு
    "audiogreen3.mp3":[0,5000],       // ம | டம்

    "audiogreen4.mp3":[0,5000],       // தா | டி
    "audiogreen5.mp3":[0,5000],       // பாட் | டி
    "audiogreen6.mp3":[0,5000],       // மா | டம்

    "audiogreen7.mp3":[0,5000],       // தி | கதி
    "audiogreen8.mp3":[0,5000],       // பி | தா
    "audiogreen9.mp3":[0,5000],       // மி | டுக்கு

    "audiogreen10.mp3":[0,5000],      // தீ | மை
    "audiogreen11.mp3":[0,5000],      // பீ | மா
    "audiogreen12.mp3":[0,5000],      // மீ | சை

    // ==========================
    // YELLOW
    // ==========================

    "audioyellow1.mp3":[0,5000],      // துக் | கம்
    "audioyellow2.mp3":[0,5000],      // புட் | டு
    "audioyellow3.mp3":[0,5000],      // முட் | டை

    "audioyellow4.mp3":[0,5000],      // தூக் | கம்
    "audioyellow5.mp3":[0,5000],      // பூட் | டு
    "audioyellow6.mp3":[0,5000],      // மூட் | டை

    // ==========================
    // BLUE
    // ==========================

    "audioblue1.mp3":[0,5000],        // தெப் | பம்
    "audioblue2.mp3":[0,5000],        // பெட் | டி
    "audioblue3.mp3":[0,5000],        // மெட் | டி

    "audioblue4.mp3":[0,5000],        // தே | சம்
    "audioblue5.mp3":[0,5000],        // பேத் | தி
    "audioblue6.mp3":[0,5000],        // மே | தை

    // ==========================
    // ORANGE
    // ==========================

    "audiored1.mp3":[0,5000],         // க | தை
    "audiored2.mp3":[0,5000]          // சு | மை

};


// ===========================================
// LETTER HIGHLIGHT
// ===========================================

function clearHighlight(button){

    if(!button) return;

    button.querySelectorAll("span").forEach(span=>{

        span.classList.remove("active");

    });

}


function animateLetters(button,audioFile,duration){

    clearHighlight(button);

    timers.forEach(timer=>clearTimeout(timer));

    timers=[];

    const letters=button.querySelectorAll("span");

    if(letters.length===0) return;

    // ===========================================
    // CUSTOM TIMINGS
    // ===========================================

    if(timings[audioFile]){

        timings[audioFile].forEach((time,index)=>{

            if(index>=letters.length) return;

            const timer=setTimeout(()=>{

                letters.forEach(l=>l.classList.remove("active"));

                letters[index].classList.add("active");

            },time);

            timers.push(timer);

        });

    }

    // ===========================================
    // AUTOMATIC (if no custom timing exists)
    // ===========================================

    else{

        const delay=duration/letters.length;

        letters.forEach((letter,index)=>{

            const timer=setTimeout(()=>{

                letters.forEach(l=>l.classList.remove("active"));

                letter.classList.add("active");

            },index*delay);

            timers.push(timer);

        });

    }

}


// ===========================================
// BUTTON CLICK
// ===========================================

buttons.forEach(button=>{

    button.addEventListener("click",function(){

        const audioFile=this.dataset.audio;

        // Stop same audio
        if(
            currentAudio &&
            currentButton===this &&
            !currentAudio.paused
        ){

            currentAudio.pause();
            currentAudio.currentTime=0;

            this.classList.remove("playing");

            clearHighlight(this);

            timers.forEach(timer=>clearTimeout(timer));

            timers=[];

            currentAudio=null;
            currentButton=null;

            return;

        }

        // Stop previous audio
        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime=0;

        }

        // Remove old highlights
        buttons.forEach(btn=>{

            btn.classList.remove("playing");

            clearHighlight(btn);

        });

        timers.forEach(timer=>clearTimeout(timer));

        timers=[];

        // New audio
        currentAudio=new Audio(audioFile);

        currentButton=this;

        this.classList.add("playing");

        currentAudio.onloadedmetadata=()=>{

            animateLetters(
                this,
                audioFile,
                currentAudio.duration*1000
            );

        };



        currentAudio.play();

        // Audio finished
        currentAudio.onended=()=>{

            this.classList.remove("playing");

            clearHighlight(this);

            timers.forEach(timer=>clearTimeout(timer));

            timers=[];

            currentAudio=null;
            currentButton=null;

        };

        // Audio error
        currentAudio.onerror=()=>{

            alert("Audio file not found:\n"+audioFile);

            this.classList.remove("playing");

            clearHighlight(this);

            timers.forEach(timer=>clearTimeout(timer));

            timers=[];

            currentAudio=null;
            currentButton=null;

        };

    });

});

// ===========================================
// KEYBOARD STOP
// ===========================================

document.addEventListener("keydown",function(e){

    if(e.code==="Space"){

        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime=0;

            if(currentButton){

                currentButton.classList.remove("playing");

                clearHighlight(currentButton);

            }

            timers.forEach(timer=>clearTimeout(timer));

            timers=[];

            currentAudio=null;
            currentButton=null;

        }

    }

});

// ===========================================
// PAGE NAVIGATION
// ===========================================

function nextPage(page,direction){

    const book=document.querySelector(".container");

    if(direction==="next"){

        book.classList.add("flip-out-next");

    }else{

        book.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}




</script>
