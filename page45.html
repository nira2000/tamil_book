<script>
    
const buttons = document.querySelectorAll(".word-btn");

let currentAudio = null;
let currentButton = null;

// ===========================================
// Button Click
// ===========================================

buttons.forEach(button => {

    button.addEventListener("click", function () {

        const audioFile = this.dataset.audio;

        // Stop if same button clicked again
        if(
            currentAudio &&
            currentButton === this &&
            !currentAudio.paused
        ){

            currentAudio.pause();
            currentAudio.currentTime = 0;

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

            return;
        }

        // Stop previous audio
        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime = 0;

        }

        // Remove previous highlight
        buttons.forEach(btn=>{

            btn.classList.remove("playing");

        });

        // Play new audio
        currentAudio = new Audio(audioFile);

        currentButton = this;

        this.classList.add("playing");

        currentAudio.play();

        // Finished
        currentAudio.onended = ()=>{

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

        // Error
        currentAudio.onerror = ()=>{

            alert("Audio file not found:\n"+audioFile);

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

    });

});

// ===========================================
// Keyboard Stop
// ===========================================

document.addEventListener("keydown",function(e){

    if(e.code==="Space"){

        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime=0;

            if(currentButton){

                currentButton.classList.remove("playing");

            }

            currentAudio=null;
            currentButton=null;

        }

    }

});

// ===========================================
// Page Navigation
// ===========================================

function nextPage(page,direction){

    const book=document.querySelector(".container");

    if(direction==="next"){

        book.classList.add("flip-out-next");

    }else{

        book.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}
