/* ===========================================
   PAGE 43 - TAMIL DIGITAL BOOK
=========================================== */

*{
    margin:0;
    padding:0;

}

body{

    background:#dff4ff;
    display:flex;
    justify-content:center;

    min-height:100vh;

}

/* ========================================= */

.page-container{

    width:100%;
    max-width:900px;

    background:#fffef8;

    border:8px solid #f2d8a0;

    border-radius:30px;

    padding:30px;

    box-shadow:0 10px 25px rgba(0,0,0,.15);

}

/* ========================================= */

.lesson-number{

    font-size:26px;

    font-weight:700;

}

/* ========================================= */

.title-box{

    margin-bottom:35px;

}

.title-box h1{

}

/* ========================================= */

.word-grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:18px 40px;

}

/* ========================================= */

.word-btn{

    width:100%;

    height:72px;

    border:none;

    border-radius:14px;

    font-size:32px;

    font-weight:600;

    cursor:pointer;

    font-family:'Noto Sans Tamil',sans-serif;

    border:2px solid rgba(0,0,0,.25);

    box-shadow:0 5px 10px rgba(0,0,0,.12);

}

/* ========================================= */

.word-btn:hover{

    transform:translateY(-4px);

    box-shadow:0 12px 18px rgba(0,0,0,.18);

}

/* ========================================= */

.word-btn:active{

    transform:scale(.97);

}

/* ========================================= */

.green{

    background:#7fd56a;

}

.green-light{

    background:#b8f76b;

}

.yellow{

    background:#ffe996;

}

.blue{

    background:#67d2e4;

}

.orange{

    background:#ff9c74;

}

/* ========================================= */

.word-btn.playing{

    animation:glow 1s infinite;

}

@keyframes glow{

    0%{

        box-shadow:0 0 8px #ffd54a;

        transform:scale(1);

    }

    50%{

        box-shadow:0 0 22px #ffd54a;

        transform:scale(1.04);

    }

    100%{

        box-shadow:0 0 8px #ffd54a;

        transform:scale(1);

    }

}

   TABLET
========================================= */

.navigation{

.nav-btn{

}

.dots{

.nav-btn:active{

.dots{

}

.dot{

}

.dot.active{

}



.flip-out-next{

animation:flipNext .6s ease forwards;

transform-origin:left center;

}

.flip-out-prev{

animation:flipPrev .6s ease forwards;

transform-origin:right center;

}

@keyframes flipNext{

0%{

transform:rotateY(0);

opacity:1;

}

100%{

transform:rotateY(-120deg);

opacity:0;

}

}

@keyframes flipPrev{

0%{

opacity:0;

}

}


.highlight{
    color:#111;
    transition:.25s;
}

.word-btn.playing .highlight{

    font-weight:700;

<script>
    
const buttons = document.querySelectorAll(".word-btn");

let currentAudio = null;
let currentButton = null;

// ===========================================
// Button Click
// ===========================================

buttons.forEach(button => {

    button.addEventListener("click", function () {

        const audioFile = this.dataset.audio;

        // Stop if same button clicked again
        if(
            currentAudio &&
            currentButton === this &&
            !currentAudio.paused
        ){

            currentAudio.pause();
            currentAudio.currentTime = 0;

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

            return;
        }

        // Stop previous audio
        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime = 0;

        }

        // Remove previous highlight
        buttons.forEach(btn=>{

            btn.classList.remove("playing");

        });

        // Play new audio
        currentAudio = new Audio(audioFile);

        currentButton = this;

        this.classList.add("playing");

        currentAudio.play();

        // Finished
        currentAudio.onended = ()=>{

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

        // Error
        currentAudio.onerror = ()=>{

            alert("Audio file not found:\n"+audioFile);

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

    });

});

// ===========================================
// Keyboard Stop
// ===========================================

document.addEventListener("keydown",function(e){

    if(e.code==="Space"){

        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime=0;

            if(currentButton){

                currentButton.classList.remove("playing");

            }

            currentAudio=null;
            currentButton=null;

        }

    }

});

// ===========================================
// Page Navigation
// ===========================================

function nextPage(page,direction){

    const book=document.querySelector(".container");

    if(direction==="next"){

        book.classList.add("flip-out-next");

    }else{

        book.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
