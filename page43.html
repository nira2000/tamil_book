<style>
    


/* ===========================================
   PAGE 43 - TAMIL DIGITAL BOOK
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Tamil',sans-serif;
    background:#dff4ff;
    display:flex;

    align-items:center;
    min-height:100vh;

}

/* ========================================= */

/* ===========================================
   PAGE CONTAINER
=========================================== */

.page-container{

    position:relative;

    width:100%;
    max-width:900px;

    background:#fffef8;

    border:8px solid #f2d8a0;

    border-radius:30px;

    padding:30px 35px;

    box-shadow:0 10px 25px rgba(0,0,0,.15);

}

/* RED SPINE */

.page-container::before{

    content:"";

    position:absolute;

    left:10px;

    top:22px;

    bottom:22px;

    width:10px;

    background:#D40C02;

    border-radius:8px;

}

/* ===========================================
   LESSON
=========================================== */

.lesson-number{

    font-size:26px;

    font-weight:700;

    margin-bottom:10px;

}

/* ===========================================
   TITLE
=========================================== */

.title-box{

    width:fit-content;

    margin:0 auto 30px;

    padding:10px 24px;

    background:#fff3c9;

    border:3px solid #d6a54f;

    border-radius:14px;

}

.title-box h1{

    font-size:42px;

    font-weight:700;

}

/* ===========================================
   WORD GRID
=========================================== */

.word-grid{

    display:grid;

    grid-template-columns:220px 220px;

    justify-content:center;

    column-gap:60px;

    row-gap:8px;

}

/* ===========================================
   BUTTONS
=========================================== */

.word-btn{

    width:220px;

    height:62px;

    border:none;

    border-radius:10px;

    font-family:'Noto Sans Tamil',sans-serif;

    font-size:24px;

    font-weight:600;

    cursor:pointer;

    border:2px solid rgba(0,0,0,.18);

    box-shadow:0 4px 8px rgba(0,0,0,.12);

    transition:.25s;

}

.word-btn:hover{

    transform:translateY(-2px);

}

/* ===========================================
   COLOURS
=========================================== */

.green{

    background:#7fd567;

}

.green-light{

    background:#b8f762;

}

.yellow{

    background:#ffef9c;

}

.blue{

    background:#64d2e5;

}

.orange{

    background:#ff9c74;

}

/* ===========================================
   GAP BETWEEN COLOUR GROUPS
=========================================== */

.word-grid button:nth-child(13),
.word-grid button:nth-child(14){

    margin-top:40px;

}

.word-grid button:nth-child(19),
.word-grid button:nth-child(20){

    margin-top:16px;

}

.word-grid button:nth-child(25),
.word-grid button:nth-child(26){

    margin-top:14px;

}

/* ===========================================
   PAGE NUMBER
=========================================== */

.page-number{

    margin-top:24px;

    text-align:center;

    color:#7a42d5;

    font-size:24px;

    font-weight:bold;

}

/* ===========================================
   NAVIGATION
=========================================== */

.navigation{

    margin-top:16px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:56px;

    height:56px;

    border:none;

    border-radius:50%;

    background:#fff8ea;

    font-size:26px;

    cursor:pointer;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

    transition:.25s;

}

.nav-btn:hover{

    transform:scale(1.05);

}

.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:10px;

    height:10px;

    border-radius:50%;

    background:#bbb;

}

.dot.active{

    background:#35ff2d;

}

/* ===========================================
   HIGHLIGHT
=========================================== */

.highlight{

    transition:.25s;

}

.word-btn.playing .highlight{

    color:red;

    font-weight:bold;

}

<script>
    
const buttons = document.querySelectorAll(".word-btn");

let currentAudio = null;
let currentButton = null;

// ===========================================
// Button Click
// ===========================================

buttons.forEach(button => {

    button.addEventListener("click", function () {

        const audioFile = this.dataset.audio;

        // Stop if same button clicked again
        if(
            currentAudio &&
            currentButton === this &&
            !currentAudio.paused
        ){

            currentAudio.pause();
            currentAudio.currentTime = 0;

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

            return;
        }

        // Stop previous audio
        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime = 0;

        }

        // Remove previous highlight
        buttons.forEach(btn=>{

            btn.classList.remove("playing");

        });

        // Play new audio
        currentAudio = new Audio(audioFile);

        currentButton = this;

        this.classList.add("playing");

        currentAudio.play();

        // Finished
        currentAudio.onended = ()=>{

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

        // Error
        currentAudio.onerror = ()=>{

            alert("Audio file not found:\n"+audioFile);

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

    });

});

// ===========================================
// Keyboard Stop
// ===========================================

document.addEventListener("keydown",function(e){

    if(e.code==="Space"){

        if(currentAudio){

            currentAudio.pause();
            currentAudio.currentTime=0;

            if(currentButton){

                currentButton.classList.remove("playing");

            }

            currentAudio=null;
            currentButton=null;

        }

    }

});

// ===========================================
// Page Navigation
// ===========================================

function nextPage(page,direction){

    const book=document.querySelector(".container");

    if(direction==="next"){

        book.classList.add("flip-out-next");

    }else{

        book.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
