<style>
    
/* ===========================================
   RESET
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Tamil',sans-serif;
    background:#1b2c73;
    padding:20px;
    overflow-x:hidden;
    overflow-y:auto;
    perspective:1500px;
}

/* ===========================================
   FLIP ANIMATION
=========================================== */

.flip-out-next{
    animation:flipNext .6s ease forwards;
    transform-origin:left center;
}

.flip-out-prev{
    animation:flipPrev .6s ease forwards;
    transform-origin:right center;
}

@keyframes flipNext{
    from{
        transform:rotateY(0);
        opacity:1;
    }
    to{
        transform:rotateY(-120deg);
        opacity:0;
    }
}

@keyframes flipPrev{
    from{
        transform:rotateY(0);
        opacity:1;
    }
    to{
        transform:rotateY(120deg);
        opacity:0;
    }
}

/* ===========================================
   WRAPPER
=========================================== */

.page-wrapper{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    transform-style:preserve-3d;
}

.book{

    width:100%;
    max-width:940px;

    background:#fbf8ef;

    border:8px solid #e9dcb8;

    border-radius:24px;

    padding:22px;

    box-shadow:0 18px 40px rgba(0,0,0,.35);

    transition:.5s ease;

    position: relative;

}

.book::before{

    content:"";

    position:absolute;

    left:-10px;
    top:20px;
    bottom:20px;

    width:18px;

    background:#D40C02;

    border-radius:10px;
}

   TITLE

    box-shadow:0 6px 12px rgba(0,0,0,.15);

}

.lesson{

    font-size:30px;

    font-weight:700;

    margin-bottom:25px;

}

/* ===========================================
   GRID
=========================================== */

.main{

    display:grid;

    grid-template-columns:60px repeat(3,minmax(120px,1fr));

    gap:22px;

    justify-items:center;

    align-items:start;

}

.sound-column{

    gap:15px;

.empty{

.column{

    gap:12px;

}

.group{

}

/* ===========================================
   BUTTONS
=========================================== */

    border-radius:10px;

    font-size:28px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

    user-select:none;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

.head{

    font-size:30px;

}

.head::after{

    content:"🔊";

    position:absolute;

    top:5px;

    font-size:12px;

    opacity:.85;

    pointer-events:none;

}

button:hover{

}

button:active{

<script>

// ===========================================
// AUDIO PLAYER
// ===========================================

let currentAudio = null;
let currentButton = null;

let highlightTimer = null;
let highlightedButtons = [];


// Stop everything
function stopAudio(){

    // Stop audio
    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    // Stop timer
    if(highlightTimer){
        clearInterval(highlightTimer);
        highlightTimer = null;
    }

    // Remove highlights
    highlightedButtons.forEach(btn=>{
        btn.classList.remove("playing");
    });

    highlightedButtons = [];

    // Remove current button highlight
    if(currentButton){
        currentButton.classList.remove("playing");
    }

    currentAudio = null;
    currentButton = null;

}



// ===========================================
// PLAY AUDIO
// ===========================================

function playAudio(button){

    const file = button.dataset.audio;

    if(!file) return;

    // Click same button again = STOP
    if(currentButton === button && currentAudio && !currentAudio.paused){

        stopAudio();
        return;

    }

    // Stop anything already playing
    stopAudio();

    currentAudio = new Audio(file);
    currentButton = button;

    // ===================================
    // DARK GREEN BUTTON
    // ===================================

    if(button.classList.contains("head") &&
       button.classList.contains("green")){

        const column = button.closest(".column");

        const buttons = [

            ...column.querySelectorAll(".group:nth-child(1) .btn.green"),
            ...column.querySelectorAll(".group:nth-child(2) .head.yellow"),
            ...column.querySelectorAll(".group:nth-child(2) .btn.yellow"),
            ...column.querySelectorAll(".group:nth-child(3) .head.blue"),
            ...column.querySelectorAll(".group:nth-child(3) .btn.blue"),
            ...column.querySelectorAll(".group:nth-child(4) .head.orange")

        ];

        highlightedButtons = buttons;

        let index = 0;

        buttons[index].classList.add("playing");

        highlightTimer = setInterval(()=>{

            buttons[index].classList.remove("playing");

            index++;

            if(index < buttons.length){

                buttons[index].classList.add("playing");

            }
            else{

                clearInterval(highlightTimer);
                highlightTimer = null;

            }

        },11000/buttons.length);

    }

    // ===================================
    // NORMAL BUTTON
    // ===================================

    else{

        button.classList.add("playing");
        highlightedButtons = [button];

    }

    currentAudio.onended = stopAudio;

    currentAudio.play();

}



// ===========================================
// CLICK EVENTS
// ===========================================

document.querySelectorAll("[data-audio]").forEach(button=>{

    button.addEventListener("click",()=>{

        playAudio(button);

    });

});



// ===========================================
// PAGE FLIP
// ===========================================

function nextPage(page,direction){

    const pageContainer=document.querySelector(".container");

    pageContainer.classList.remove("flip-out-next","flip-out-prev");

    void pageContainer.offsetWidth;

    if(direction==="next"){

        pageContainer.classList.add("flip-out-next");

    }else{

        pageContainer.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
