<html lang="ta">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> page 44 தமிழ் எழுத்துகள்</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<style>
    

    
/* ===========================================
   RESET
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Tamil',sans-serif;
    background:#1b2c73;
    padding:20px;
    overflow-x:hidden;
    overflow-y:auto;
    perspective:1500px;
}

/* ===========================================
   FLIP ANIMATION
=========================================== */

.flip-out-next{
    animation:flipNext .6s ease forwards;
    transform-origin:left center;
}

.flip-out-prev{
    animation:flipPrev .6s ease forwards;
    transform-origin:right center;
}

@keyframes flipNext{
    from{
        transform:rotateY(0);
        opacity:1;
    }
    to{
        transform:rotateY(-120deg);
        opacity:0;
    }
}

@keyframes flipPrev{
    from{
        transform:rotateY(0);
        opacity:1;
    }
    to{
        transform:rotateY(120deg);
        opacity:0;
    }
}

/* ===========================================
   WRAPPER
=========================================== */

.page-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    transform-style:preserve-3d;
}

.book{

    width:100%;
    max-width:980px;

    background:#fbf8ef;

    border:8px solid #e9dcb8;

    border-radius:24px;

    padding:28px;

    box-shadow:0 18px 40px rgba(0,0,0,.35);

    transition:.5s ease;

    position: relative;

}

.book::before{

    content:"";

    position:absolute;

    left:-10px;
    top:20px;
    bottom:20px;

    width:18px;

    background:#D40C02;

    border-radius:10px;
}

/* ===========================================
   TITLE
=========================================== */

.page-title{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
}

.page-title h1{

    background:#f8c45d;

    border:3px solid #b88214;

    border-radius:15px;

    padding:12px 45px;

    font-size:42px;

    box-shadow:0 6px 12px rgba(0,0,0,.15);

}

.lesson{

    font-size:30px;

    font-weight:700;

    margin-bottom:25px;

}

/* ===========================================
   GRID
=========================================== */

.main{

    display:grid;

    grid-template-columns:60px repeat(3,minmax(120px,1fr));

    gap:22px;

    justify-items:center;

    align-items:start;

}

.sound-column{

    display:flex;

    flex-direction:column;

    gap:12px;

    margin-top:405px;

}

.sound{

    width:60px;

    height:52px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f8d8d8;

    border:2px solid #b38c8c;

    border-radius:10px;

    font-size:22px;

    font-weight:bold;

    user-select:none;

}

.empty{
    visibility:hidden;
}

.column{

    display:flex;

    flex-direction:column;

    gap:12px;

}

.group{

    display:flex;

    flex-direction:column;

    gap:12px;

}

/* ===========================================
   BUTTONS
=========================================== */

.head,
.btn{

    width:120px;

    height:54px;

    border:none;

    border-radius:10px;

    font-family:'Noto Sans Tamil',sans-serif;

    font-size:28px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

    user-select:none;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

}

.head{

    position:relative;

    font-size:30px;

    cursor:pointer;

}

.head::after{

    content:"🔊";

    position:absolute;

    top:5px;

    right:6px;

    font-size:12px;

    opacity:.85;

    pointer-events:none;

}

button:hover{

    transform:translateY(-4px) scale(1.03);

}

button:active{

    transform:scale(.96);

}

/* ===========================================
   COLORS
=========================================== */

.green{
    background:#b7ef67;
    border:2px solid #709541;
}

.head.green{
    background:#79d15d;
}

.yellow{
    background:#fff29a;
    border:2px solid #b9a548;
}

.blue{
    background:#66d8e8;
    border:2px solid #397f89;
}

.orange{
    background:#ff9d71;
    border:2px solid #ba6c47;
}

/* ===========================================
   GLOW
=========================================== */

.playing{
    animation:glow 1s infinite;
}

@keyframes glow{

0%{
box-shadow:0 0 0 rgba(255,196,0,0);
}

50%{
box-shadow:
0 0 15px rgba(255,196,0,.9),
0 0 30px rgba(255,196,0,.5);
}

100%{
box-shadow:0 0 0 rgba(255,196,0,0);
}

}

/* ===========================================
   PAGE NUMBER
=========================================== */

.page-number{

    margin-top:28px;

    text-align:center;

    font-size:28px;

    font-weight:bold;

    color:#7a42d5;

}

/* ===========================================
   NAVIGATION
=========================================== */

.navigation{

    margin-top:22px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:64px;

    height:64px;

    border:none;

    border-radius:50%;

    background:#f8f1e4;

    font-size:30px;

    cursor:pointer;

    transition:.25s;

    box-shadow:0 5px 12px rgba(0,0,0,.18);

}

.nav-btn:hover{

    transform:scale(1.08);

}

.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#a8a8a8;

}

.dot.active{

    background:#32ff3f;

}

.highlight{

    color:#111;

    transition:.25s;

}

.playing .highlight{

    color:#e60000;

}

.eye-box{

    width:60px;
    height:52px;

}

.eye-box img{

    width:60px;
    height:60px;

}

.speaker{
    position:relative;
}

.speaker::after{

    content:"🔊";

    position:absolute;

    top:4px;

    right:5px;

    font-size:11px;

    pointer-events:none;

}










/* ===========================================
   MOBILE & TABLET
=========================================== */

@media (max-width:900px){

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100dvh;

    overflow:hidden;

}

body{

    background:#1b2c73;

    display:flex;
    justify-content:center;

}

.book{

}

/* RED SPINE */

}

}

}

.lesson{

}

/* ---------- GRID ---------- */

.main{

}

/* ---------- PINK COLUMN ---------- */

}

}

/* ---------- EYE ---------- */

.eye-box{

    width:32px;

    align-items:center;

}

.eye-box img{

    width:34px;
    height:34px;

    object-fit:contain;

}

/* ---------- BUTTONS ---------- */

.column{

    gap:6px;

}

.group{

    gap:4px;

}

.head,
.btn{

    width:60px;
    height:28px;

    font-size:17px;

    border-radius:8px;

}

.head{

    font-size:18px;

}

.head::after{

    top:2px;
    right:3px;

    font-size:8px;

}

/* ---------- BOTTOM ---------- */

.page-number{

    margin-top:2px;

}

.navigation{

}

.nav-btn{

}

.dots{

}

}

.speaker::after{

    right:3px;

    font-size:8px;

}

}

</style>

<!-- Audio Files -->
<!-- GREEN -->
<audio id="tha_head" src="tha_head.mp3"></audio>
<audio id="tha_green" src="tha_green.mp3"></audio>

<audio id="pa_green" src="pa_green.mp3"></audio>

<audio id="ma_head" src="ma_head.mp3"></audio>
<audio id="ma_green" src="ma_green.mp3"></audio>

<!-- YELLOW -->

<script>

// ===========================================
// AUDIO PLAYER
// ===========================================

let currentAudio = null;
let currentButtons = [];

// ===========================================
// STOP ALL
// ===========================================

function stopAll(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime = 0;

    }

    currentButtons.forEach(btn=>{

        btn.classList.remove("playing");

    });

    currentAudio = null;
    currentButtons = [];

}

// ===========================================
// PLAY AUDIO
// ===========================================

function playAudio(audioId,buttons){

    const audio=document.getElementById(audioId);

    if(!audio){

        console.log("Missing audio:",audioId);
        return;

    }

    // Click same audio again = STOP

    if(currentAudio===audio && !audio.paused){

        stopAll();
        return;

    }

    stopAll();

    currentAudio=audio;
    currentButtons=buttons;

    buttons.forEach(btn=>{

        btn.classList.add("playing");

    });

    audio.currentTime=0;
    audio.play();

    audio.onended=stopAll;

}

// ===========================================
// DARK GREEN HEAD BUTTONS
// ===========================================

document.querySelectorAll(".head.green").forEach(head=>{

    head.addEventListener("click",function(){

        playAudio(

            this.dataset.audio,

            [this]

        );

    });

});

// ===========================================
// LIGHT GREEN GROUPS
// ===========================================

document.querySelectorAll(".btn.group-green[data-audio]").forEach(firstBtn=>{

    firstBtn.addEventListener("click",function(){

        const group=this.closest(".group");

        const buttons=[...group.querySelectorAll(".group-green")];

        playAudio(

            this.dataset.audio,

            buttons

        );

    });

});

// ===========================================
// YELLOW
// ===========================================

document.querySelectorAll(".group[data-audio='yellow'] .head").forEach(head=>{

    head.addEventListener("click",function(){

        const buttons=[

            this,
            ...this.closest(".group").querySelectorAll(".btn")

        ];

        playAudio(

            "yellowAudio",

            buttons

        );

    });

});

// ===========================================
// BLUE
// ===========================================

document.querySelectorAll(".group[data-audio='blue'] .head").forEach(head=>{

    head.addEventListener("click",function(){

        const buttons=[

            this,
            ...this.closest(".group").querySelectorAll(".btn")

        ];

        playAudio(

            "blueAudio",

            buttons

        );

    });

});

// ===========================================
// ORANGE
// ===========================================

document.querySelectorAll(".group[data-audio='orange'] .head").forEach(head=>{

    head.addEventListener("click",function(){

        playAudio(

            "orangeAudio",

            [this]

        );

    });

});

// ===========================================
// PAGE FLIP
// ===========================================

function nextPage(page,direction){

    const pageContainer=document.querySelector(".container");

    if(direction==="next"){

        pageContainer.classList.add("flip-out-next");

    }

    else{

        pageContainer.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}

</script>
