<style>
    


/* ===========================
   RESET
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* ===========================
   MAIN PAGE
=========================== */

.page{
    width:900px;
    position:relative;
}

/* ===========================
   TOP DECORATION
=========================== */

.corner{
    position:absolute;
    left:-10px;
    top:-10px;
    width:150px;
}

.corner img{
    width:100%;
}

/* ===========================
   TITLE
=========================== */

.title{
    width:420px;
    height:110px;

    margin:0 auto 45px;

    background:#F8F3EB;

    border:12px solid #91573E;

    border-radius:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:52px;
    font-weight:bold;
    color:#000;
}

/* Small stars */

.star1,
.star2,
.star3,
.star4{

    position:absolute;
    color:#87543A;
    font-size:26px;
}

.star1{
    top:25px;
    left:230px;
}

.star2{
    top:70px;
    left:210px;
}

.star3{
    top:30px;
    right:200px;
}

.star4{
    top:75px;
    right:180px;
}

/* ===========================
   GRID
=========================== */

.grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    border:3px solid #222;

    background:#F8E7A4;
}

/* ===========================
   CARD
=========================== */

.card{

    height:305px;

    border-right:3px solid #222;
    border-bottom:3px solid #222;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

    align-items:center;

    padding:18px 10px;
}

.card:nth-child(3n){
    border-right:none;
}

.card:nth-last-child(-n+3){
    border-bottom:none;
}

/* ===========================
   IMAGE
=========================== */

.card img{

    max-width:170px;
    max-height:150px;

    object-fit:contain;

    user-select:none;

    pointer-events:none;
}

/* ===========================
   WORD BUTTON
=========================== */

.word{

    width:210px;
    height:58px;

    border:3px solid #222;

    border-radius:6px;

    background:#F6E8A7;

    font-size:30px;

    font-weight:bold;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.25s;
}

/* Hover */

.word:hover{

    background:#FCEFAF;

    transform:translateY(-2px);
}

/* Click */

.word:active{

    transform:scale(.95);

    background:#EFD982;
}

/* Playing */

.word.playing{

    background:#D8F0B0;

    border-color:#2D7A2D;

    color:#1B4E1B;
}

/* ===========================
   PAGE NUMBER
=========================== */

.pageNo{

    width:55px;
    height:70px;

    background:#91573E;

    color:white;

    margin:28px auto 0;

    border-radius:15px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:42px;

    font-weight:bold;
}



/* ==========================
   BOOK LAYOUT
========================== */

body{

    font-family:"Noto Sans Tamil",sans-serif;

    background:#111D66;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

    perspective:1500px;
}

.app{

    width:100%;

    max-width:950px;
}

.header{

    color:white;

        0 0 8px white,

        0 0 35px #4FC3F7;
}

.book{

    position:relative;

    background:#F8F1E4;

    border-radius:28px;

    padding:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.book::before{

    content:"";

    position:absolute;

    left:-10px;

    top:25px;

    bottom:25px;

    width:18px;

    background:#D40C02;

    border-radius:12px;
}

.book-content{

    display:flex;
    padding-top:5px;
    justify-content:center;
    align-items:flex-start;
}

.navigation{

    margin-top:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.nav-btn{

    width:65px;

    height:65px;

    border:none;

    border-radius:50%;

    background:#F8F1E4;

    font-size:30px;

    cursor:pointer;

    box-shadow:0 5px 15px rgba(0,0,0,.25);

    transition:.3s;
}

.nav-btn:hover{

    transform:scale(1.08);
}

.dots{

    display:flex;

    gap:10px;
}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#999;
}

.dot.active{

    background:#00ff40;
}

.page-number{

    margin-top:20px;

    text-align:center;

    font-size:26px;

    color:#9d68d3;

    font-weight:bold;
}

.flip-out-next{
    animation:flipNext .6s ease forwards;
    transform-origin:left center;
}

.flip-out-prev{
    animation:flipPrev .6s ease forwards;
    transform-origin:right center;
}

@keyframes flipNext{

    from{
        transform:rotateY(0deg);
        opacity:1;
    }

    to{
        transform:rotateY(-120deg);
        opacity:0;
    }
}

@keyframes flipPrev{

    from{
        transform:rotateY(0deg);
        opacity:1;
    }

    to{
        transform:rotateY(120deg);
        opacity:0;
    }
}

<script>

function nextPage(page,direction){

    const app=document.querySelector(".app");

    if(direction==="next")
        app.classList.add("flip-out-next");
    else
        app.classList.add("flip-out-prev");

    setTimeout(()=>{
        window.location.href=page;
    },600);

}

  
// ===========================
// AUDIO PLAYER
// ===========================

let currentAudio = null;
let currentButton = null;

// Get all word buttons
const words = document.querySelectorAll(".word");

// Loop through every button
words.forEach(button => {

    button.addEventListener("click", function () {

        const audioFile = this.dataset.audio;

        // If same button is clicked again, stop audio
        if (
            currentAudio &&
            currentButton === this &&
            !currentAudio.paused
        ) {

            currentAudio.pause();
            currentAudio.currentTime = 0;

            this.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

            return;
        }

        // Stop previous audio
        if (currentAudio) {

            currentAudio.pause();
            currentAudio.currentTime = 0;

        }

        // Remove previous highlight
        words.forEach(btn => btn.classList.remove("playing"));

        // Create new audio
        currentAudio = new Audio(audioFile);

        currentButton = this;

        // Highlight current button
        this.classList.add("playing");

        // Play
        currentAudio.play();

        // Remove highlight when finished
        currentAudio.onended = function () {

            currentButton.classList.remove("playing");

            currentAudio = null;
            currentButton = null;

        };

    });

});








function fitPage(){

    if(window.innerWidth > 768){

        document.querySelector(".page").style.transform="";

        return;

    }

    const page=document.querySelector(".page");

    const book=document.querySelector(".book-content");

    const pageWidth=900;

    const pageHeight = page.offsetHeight;

    const availableWidth=book.clientWidth;

    const availableHeight=book.clientHeight;

    const scale=Math.min(

        availableWidth/pageWidth,

        availableHeight/pageHeight

    );

    page.style.transform=`scale(${scale})`;

}

window.addEventListener("load",fitPage);

window.addEventListener("resize",fitPage);



</script>
