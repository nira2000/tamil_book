<!DOCTYPE html>
<html lang="ta">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> page 44 தமிழ் எழுத்துகள்</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<style>
    
/* ===========================================
   RESET
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Noto Sans Tamil',sans-serif;

    background:#1b2c73;

    padding:20px;

    display:flex;

    justify-content:center;

}

/* ===========================================
   BOOK
=========================================== */

.page-wrapper{

    width:100%;

    display:flex;

    justify-content:center;

}

.container{

    width:100%;

    display:flex;

    justify-content:center;

}

.book{

    position:relative;

    width:100%;

    max-width:850px;

    background:#fbf8ef;

    border:8px solid #e9dcb8;

    border-radius:24px;

    padding:28px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

/* RED SPINE */

.book::before{

    content:"";

    position:absolute;

    left:-10px;

    top:20px;

    bottom:20px;

    width:18px;

    background:#d40c02;

    border-radius:10px;

}

/* ===========================================
   TITLE
=========================================== */

.page-title{

    display:flex;

    justify-content:center;

    margin-bottom:20px;

}

.page-title h1{

    background:#f8c45d;

    border:3px solid #b88214;

    border-radius:15px;

    padding:12px 40px;

    font-size:42px;

}

.lesson{

    font-size:30px;

    font-weight:bold;

    margin-bottom:30px;

}

/* ===========================================
   MAIN
=========================================== */

.single-layout{

    display:flex;

    justify-content:center;

}

.single-column{

    display:flex;

    flex-direction:column;

    gap:14px;

    align-items:center;

}

/* ===========================================
   BUTTONS
=========================================== */

.btn{

    width:150px;

    height:58px;

    border:none;

    border-radius:12px;

    font-size:30px;

    font-weight:bold;

    font-family:'Noto Sans Tamil',sans-serif;

    cursor:pointer;

    position:relative;

    transition:.25s;

    box-shadow:0 5px 12px rgba(0,0,0,.18);

}

.speaker::after{

    content:"🔊";

    position:absolute;

    top:5px;

    right:6px;

    font-size:13px;

}

.green{

    background:#b7ef67;

    border:2px solid #709541;

}

.yellow{

    background:#fff29a;

    border:2px solid #b9a548;

}

.blue{

    background:#66d8e8;

    border:2px solid #397f89;

}

.orange{

    background:#ff9d71;

    border:2px solid #ba6c47;

}

.btn:hover{

    transform:translateY(-3px);

}

/* ===========================================
   HIGHLIGHT
=========================================== */

.highlight{

    color:#111;

    transition:.25s;

}

.playing .highlight{

    color:#e60000;

}

/* ===========================================
   PAGE NUMBER
=========================================== */

.page-number{

    text-align:center;

    margin-top:25px;

    font-size:28px;

    font-weight:bold;

    color:#7a42d5;

}

/* ===========================================
   NAVIGATION
=========================================== */

.navigation{

    margin-top:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:60px;

    height:60px;

    border:none;

    border-radius:50%;

    font-size:28px;

    background:#f8f1e4;

    cursor:pointer;

    box-shadow:0 5px 12px rgba(0,0,0,.18);

}

.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#aaa;

}

.dot.active{

    background:#35ff2d;

}


/* ===========================
   PAGE FLIP
=========================== */

.container{

    transform-style:preserve-3d;

}

.flip-out-next{

    animation:flipNext .6s ease forwards;

    transform-origin:left center;

}

.flip-out-prev{

    animation:flipPrev .6s ease forwards;

    transform-origin:right center;

}

@keyframes flipNext{

from{

    transform:rotateY(0);

    opacity:1;

}

to{

    transform:rotateY(-120deg);

    opacity:0;

}

}

@keyframes flipPrev{

from{

    transform:rotateY(0);

    opacity:1;

}

to{

    transform:rotateY(120deg);

    opacity:0;

}

}






@media (max-width:768px){

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100dvh;

    overflow:hidden;

}

body{

    align-items:center;

    background:#1b2c73;

}

.page-wrapper,

    height:100%;

    justify-content:center;
    align-items:center;

}

.book{

    width:100%;

    height:96dvh;

    display:flex;
    flex-direction:column;

    padding:10px;

    border:5px solid #e9dcb8;

    border-radius:16px;

    overflow:hidden;

}

.book::before{

    left:-5px;

    bottom:10px;

    width:10px;

}

.page-title{

    margin-bottom:5px;

}

.page-title h1{

    font-size:20px;

    padding:6px 18px;

}

.lesson{

    font-size:18px;

    margin-bottom:10px;

}

.single-layout{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

}

.single-column{

    gap:6px;

}

.btn{

    width:95px;

    height:36px;

    font-size:20px;

}

.speaker::after{

    top:2px;

    right:3px;

    font-size:8px;

}

.page-number{

    margin-top:8px;

    font-size:16px;

}

.navigation{

    margin-top:6px;

}

.nav-btn{

    width:38px;

    height:38px;

    font-size:18px;

}

.dots{

}

.dot{

    width:7px;

    height:7px;

}

}


</style>

</div>



</body>
