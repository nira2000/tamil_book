<!DOCTYPE html>
<html lang="ta">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> page 47 தமிழ் எழுத்துகள்</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<style>
    
/* ===========================================
   RESET
=========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Noto Sans Tamil',sans-serif;

    background:#1b2c73;

    padding:20px;

    display:flex;

    justify-content:center;

}

/* ===========================================
   BOOK
=========================================== */

.page-wrapper{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

}

.container{

    width:100%;

    max-width:850px;

    display:flex;

    justify-content:center;

    transform-style:preserve-3d;

}

.book{

    position:relative;

    width:100%;

    max-width:850px;

    background:#fbf8ef;

    border:8px solid #e9dcb8;

    border-radius:24px;

    padding:28px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

/* RED SPINE */

.book::before{

    content:"";

    position:absolute;

    left:-10px;

    top:20px;

    bottom:20px;

    width:18px;

    background:#d40c02;

    border-radius:10px;

}

/* ===========================================
   TITLE
=========================================== */

.page-title{

    display:flex;

    justify-content:center;

    margin-bottom:20px;

}

.page-title h1{

    background:#f8c45d;

    border:3px solid #b88214;

    border-radius:15px;

    padding:12px 40px;

    font-size:42px;

}

.lesson{

    font-size:30px;

    font-weight:bold;

    margin-bottom:30px;

}

/* ===========================================
   MAIN
=========================================== */

.single-layout{

    display:flex;

    justify-content:center;

}

.single-column{

    display:flex;

    flex-direction:column;

    gap:14px;

    align-items:center;

}

/* ===========================================
   BUTTONS
=========================================== */

.btn{

    width:150px;

    height:58px;

    border:none;

    border-radius:12px;

    font-size:30px;

    font-weight:bold;

    font-family:'Noto Sans Tamil',sans-serif;

    cursor:pointer;

    position:relative;

    transition:.25s;

    box-shadow:0 5px 12px rgba(0,0,0,.18);

}

.speaker::after{

    content:"🔊";

    position:absolute;

    top:5px;

    right:6px;

    font-size:13px;

}

.green{

    background:#b7ef67;

    border:2px solid #709541;

}

.yellow{

    background:#fff29a;

    border:2px solid #b9a548;

}

.blue{

    background:#66d8e8;

    border:2px solid #397f89;

}

.orange{

    background:#ff9d71;

    border:2px solid #ba6c47;

}

.btn:hover{

    transform:translateY(-3px);

}

/* ===========================================
   HIGHLIGHT
=========================================== */

.highlight{

    color:#111;

    transition:.25s;

}

.playing .highlight{

    color:#e60000;

}

/* ===========================================
   PAGE NUMBER
=========================================== */

.page-number{

    width:100%;

    text-align:center;

    margin-top:18px;

    font-size:28px;

    font-weight:bold;

    color:#7a42d5;

}

/* ===========================================
   NAVIGATION
=========================================== */

.navigation{

    width:100%;

    max-width:850px;

    margin-top:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.nav-btn{

    width:60px;

    height:60px;

    border:none;

    border-radius:50%;

    font-size:28px;

    background:#f8f1e4;

    cursor:pointer;

    box-shadow:0 5px 12px rgba(0,0,0,.18);

}

.dots{

    display:flex;

    gap:10px;

}

.dot{

    width:12px;

    height:12px;

    border-radius:50%;

    background:#aaa;

}

.dot.active{

    background:#35ff2d;

}


/* ===========================
   PAGE FLIP
=========================== */

.container{

    transform-style:preserve-3d;

}

.flip-out-next{

    animation:flipNext .6s ease forwards;

    transform-origin:left center;

}

.flip-out-prev{

    animation:flipPrev .6s ease forwards;

    transform-origin:right center;

}

@keyframes flipNext{

from{

    transform:rotateY(0);

    opacity:1;

}

to{

    transform:rotateY(-120deg);

    opacity:0;

}

}

@keyframes flipPrev{

from{

    transform:rotateY(0);

    opacity:1;

}

to{

    transform:rotateY(120deg);

    opacity:0;

}

}






@media (max-width:768px){

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100dvh;

    overflow:hidden;

}

body{

    display:flex;
    justify-content:center;
    align-items:flex-start;

    background:#1b2c73;

    padding:8px;
}


.page-wrapper{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    align-items:center;

}

.container{

    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

}



.book{

    width:100%;
    max-width:400px;

    height:90dvh;

    display:flex;
    flex-direction:column;

    padding:8px;
}

.book::before{

    left:-5px;

    top:10px;

    bottom:10px;

    width:10px;

}

.page-title{

    margin-bottom:5px;

}

.page-title h1{

    font-size:18px;

    padding:5px 16px;

}

    font-size:16px;

    margin-bottom:16px;

}

.single-layout{

}

}


</style>



<body>

<div class="page-wrapper">

    <div class="container">

        <div class="book">

            <!-- TITLE -->

            <div class="page-title">

                <h1>தமிழ் எழுத்துகள் ✏️</h1>

            </div>

            <!-- LESSON -->

            <div class="lesson">

                தொகுதி 4

            </div>

            <!-- MAIN -->

            <div class="single-layout">

                <div class="single-column">

                    <!-- GREEN -->

                    <button class="btn green speaker"
                            data-audio="a1">
                        <span class="highlight">அ</span>
                    </button>

                    <button class="btn green speaker"
                            data-audio="a2">
                        <span class="highlight">ஆ</span>
                    </button>

                    <button class="btn green speaker"
                            data-audio="i1">
                        <span class="highlight">இ</span>
                    </button>

                    <button class="btn green speaker"
                            data-audio="i2">
                        <span class="highlight">ஈ</span>
                    </button>

                    <button class="btn green speaker"
                            data-audio="u1">
                        <span class="highlight">உ</span>
                    </button>

                    <button class="btn green speaker"
                            data-audio="u2">
                        <span class="highlight">ஊ</span>
                    </button>

                    <!-- YELLOW -->

                    <button class="btn yellow speaker"
                            data-audio="e1">
                        <span class="highlight">எ</span>
                    </button>

                    <button class="btn yellow speaker"
                            data-audio="e2">
                        <span class="highlight">ஏ</span>
                    </button>

                    <button class="btn yellow speaker"
                            data-audio="ai">
                        <span class="highlight">ஐ</span>
                    </button>

                    <!-- BLUE -->

                    <button class="btn blue speaker"
                            data-audio="o1">
                        <span class="highlight">ஒ</span>
                    </button>

                    <button class="btn blue speaker"
                            data-audio="o2">
                        <span class="highlight">ஓ</span>
                    </button>

                    <button class="btn blue speaker"
                            data-audio="ow">
                        <span class="highlight">ஔ</span>
                    </button>

                     <!-- ORANGE -->

                    <button class="btn orange speaker"
                            data-audio="ah">
                        <span class="highlight">ஃ</span>
                    </button>

                </div>

            </div>

            <div class="page-number">

                47

            </div>

        </div>
        <!-- END BOOK -->

    </div>
    <!-- END CONTAINER -->

    <!-- NAVIGATION OUTSIDE BOOK -->

    <div class="navigation">

        <button
            class="nav-btn"
            onclick="nextPage('page46.html','prev')">

            ❮

        </button>

        <div class="dots">

            <div class="dot"></div>

            <div class="dot active"></div>

            <div class="dot"></div>

        </div>

        <button
            class="nav-btn"
            onclick="nextPage('page48.html','next')">

            ❯

        </button>

    </div>

</div>
<!-- END PAGE WRAPPER -->



<script>

    
// ===========================================
// AUDIO PLAYER
// ===========================================

let currentAudio = null;
let currentButtons = [];
let highlightTimer = null;

// ===========================================
// STOP ALL
// ===========================================

function stopAll(){

    if(currentAudio){

        currentAudio.pause();
        currentAudio.currentTime = 0;

    }

    if(highlightTimer){

        clearInterval(highlightTimer);

    }

    currentButtons.forEach(btn=>{

        btn.classList.remove("playing");

    });

    currentAudio=null;
    currentButtons=[];

}

// ===========================================
// PLAY AUDIO
// ===========================================

function playAudio(audioId,buttons){

    const audio=document.getElementById(audioId);

    if(!audio){

        console.log("Missing audio:",audioId);

        return;

    }

    // Click same audio again = STOP

    if(currentAudio===audio && !audio.paused){

        stopAll();

        return;

    }

    stopAll();

    currentAudio=audio;
    currentButtons=buttons;

    buttons.forEach(btn=>{

        btn.classList.add("playing");

    });

    audio.currentTime=0;
    audio.play();

    audio.onended=stopAll;

}




// ===========================================
// WORD BY WORD HIGHLIGHT
// ===========================================

function playSequential(audioId, buttons, speed){

    const audio=document.getElementById(audioId);

    if(!audio) return;

    if(currentAudio===audio && !audio.paused){

        stopAll();
        return;

    }

    stopAll();

    currentAudio=audio;
    currentButtons=buttons;

    let index=0;

    function highlightNext(){

        buttons.forEach(btn=>btn.classList.remove("playing"));

        if(index<buttons.length){

            buttons[index].classList.add("playing");

            index++;

        }

    }

    highlightNext();

    highlightTimer = setInterval(highlightNext, speed);
    audio.currentTime=0;
    audio.play();

    audio.onended=stopAll;

}






// ===========================================
// DARK GREEN HEAD BUTTONS
// ka_head
// sa_head
// da_head
// ===========================================

document.querySelectorAll(".head.green").forEach(head=>{

    head.addEventListener("click",function(){

        playAudio(

            this.dataset.audio,

            [this]

        );

    });

});




// ===========================================
// SEQUENTIAL GROUPS
// Green
// ===========================================

document.querySelectorAll(".btn.group-green[data-audio]").forEach(firstBtn=>{

    firstBtn.addEventListener("click",function(){

        const group=this.closest(".group");

        let speed = 1000;

        switch(this.dataset.audio){

            case "ka_green":
                speed = 1000;
                break;

            case "sa_green":
                speed = 1000;
                break;

            case "da_green":
                speed = 1000;
                break;

        }

        playSequential(

            this.dataset.audio,

            [...group.querySelectorAll(".group-green")],

            speed

        );

    });

});

// ===========================================
// YELLOW
// ===========================================

document.querySelectorAll(".head.yellow").forEach(head=>{

    head.addEventListener("click",function(){

        const group=this.closest(".group");

        playSequential(

            this.dataset.audio,

            [...group.querySelectorAll("button")],

            1300

        );

    });

});

// ===========================================
// BLUE
// ===========================================

document.querySelectorAll(".head.blue").forEach(head=>{

    head.addEventListener("click",function(){

        const group=this.closest(".group");

        playSequential(

            this.dataset.audio,

            [...group.querySelectorAll("button")],

            1300

        );

    });

});




// ===========================================
// ORANGE
// (UNCHANGED)
// ===========================================

document.querySelectorAll(".group[data-audio$='_orange'] .head").forEach(head=>{

    head.addEventListener("click",function(){

        playAudio(

            this.closest(".group").dataset.audio,

            [this]

        );

    });

});

// ===========================================
// PAGE FLIP
// ===========================================

function nextPage(page,direction){

    const pageContainer=document.querySelector(".container");

    if(direction==="next"){

        pageContainer.classList.add("flip-out-next");

    }

    else{

        pageContainer.classList.add("flip-out-prev");

    }

    setTimeout(()=>{

        window.location.href=page;

    },600);

}



</script>


</body>
